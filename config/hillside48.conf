# Boost the Bluetooth signal
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Report peripheral (right half) battery to host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# RGB underglow (required for smart-rgbled-widget)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Smart RGB LED battery/status widget
CONFIG_SMART_RGBLED_WIDGET=y

# SPI for LED data
CONFIG_SPI=y
